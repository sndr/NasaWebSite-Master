<section class="px-4 py-6">
    
    @if (items.length === 0) {
      <p class="text-center text-white/80">Type some about NASA...</p>
    } @else {
      <div class="results-grid">
        @for (item of items; track $index) {
          <article class="result-card">
            <button
              type="button"
              class="block relative"
              (click)="openImage(item.imageUrl)"
            >
              <img
                *ngIf="item.imageUrl"
                [src]="item.imageUrl"
                alt=""
                class="result-image cursor-pointer"
              >
            </button>
            <div class="result-body">
              <h2 class="result-title">{{ item.title }}</h2>
              <p class="result-text" *ngIf="item.description && item.description !== item.title">
                {{ item.description }}
              </p>
            </div>
          </article>
        }
      </div>
    }

    @if (selectedImageUrl) {
      <div
        class="image-modal"
        (click)="closeImage()"
      >
        <img
          [src]="selectedImageUrl"
          alt=""
          class="image-modal__img"
          (click)="$event.stopPropagation()"
        >
        <button
          type="button"
          class="image-modal__close"
          (click)="closeImage()"
        >
          Fechar
        </button>
      </div>
    }
</section>
