<section class="px-4 py-6">
    <h1 class="results-title">Content</h1>

    @if (items.length === 0) {
      <p class="text-center text-white/80">WAITING...</p>
    } @else {
      <div class="results-grid">
        @for (item of items; track $index) {
          <article class="result-card">
            <button type="button" class="block relative" (click)="openImage(item.imageUrl)" (mouseover)="onPreview(item.imageUrl)" (mouseout)="endPreview()" (focus)="onPreview(item.imageUrl)" (blur)="endPreview()">
              <img *ngIf="item.imageUrl" [src]="item.imageUrl" alt="" class="result-image">
            </button>
            <div class="result-body">
              <h2 class="result-title">{{ item.title }}</h2>
              <p class="result-text" *ngIf="item.description && item.description !== item.title">{{ item.description }}</p>
            </div>
          </article>
        }
      </div>
    }

    @if (previewImageUrl) {
      <div class="fixed inset-0 z-40 pointer-events-none flex items-center justify-center">
        <div class="absolute inset-0 bg-black/50"></div>
        <img [src]="previewImageUrl" alt="" class="relative max-h-[90vh] max-w-[90vw] rounded-lg shadow-2xl ring-1 ring-white/20">
      </div>
    }

    @if (selectedImageUrl) {
      <div class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" (click)="closeImage()">
        <img [src]="selectedImageUrl" alt="" class="max-h-[95vh] max-w-[95vw] object-contain rounded-lg shadow-2xl" (click)="$event.stopPropagation()">
        <button type="button" class="absolute top-4 right-4 px-3 py-1.5 rounded-md bg-white/90 text-gray-800 text-sm hover:bg-white" (click)="closeImage()">Fechar</button>
      </div>
    }
</section>
